services:
  # ---------------------------------------------------------------------------
  # Infrastructure
  # ---------------------------------------------------------------------------
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: hindsight
      POSTGRES_PASSWORD: hindsight
      POSTGRES_DB: hindsight
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hindsight"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ---------------------------------------------------------------------------
  # Application
  # ---------------------------------------------------------------------------
  api:
    build:
      context: .
      dockerfile: docker/Dockerfile
      target: api
    command:
      - uv
      - run
      - uvicorn
      - app.main:app
      - --host=0.0.0.0
      - --port=8000
      - --reload
    ports:
      - "8000:8000"
    environment:
      ENV: development
      DATABASE_URL: postgresql+asyncpg://hindsight:hindsight@postgres:5432/hindsight
      DATABASE_URL_SYNC: postgresql+psycopg://hindsight:hindsight@postgres:5432/hindsight
      REDIS_URL: redis://redis:6379/0
      LOG_LEVEL: INFO
      LOG_FORMAT: text
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/v1/healthz')"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s
    volumes:
      - ./app:/app/app

  worker:
    build:
      context: .
      dockerfile: docker/Dockerfile
      target: worker
    environment:
      ENV: development
      DATABASE_URL: postgresql+asyncpg://hindsight:hindsight@postgres:5432/hindsight
      REDIS_URL: redis://redis:6379/0
      LOG_LEVEL: INFO
      LOG_FORMAT: text
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    # Worker healthcheck: process is alive (no HTTP to probe)
    healthcheck:
      test: ["CMD-SHELL", "kill -0 1"]
      interval: 10s
      timeout: 5s
      retries: 3

volumes:
  pg_data:
