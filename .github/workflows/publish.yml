name: Publish Artefacts

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run (no upload)"
        required: false
        default: "true"
        type: choice
        options:
          - "true"
          - "false"

jobs:
  publish-dataset:
    name: Publish Dataset to Hugging Face Hub
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "latest"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: uv sync

      - name: Export dataset
        env:
          DATABASE_URL: "postgresql+asyncpg://hindsight:hindsight@localhost:5432/hindsight"
        run: |
          uv run python -m scripts.export_dataset \
            --output-dir data/export \
            --version "${{ github.ref_name }}"

      - name: Push dataset to Hugging Face Hub
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          DRY_RUN_FLAG=""
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ "${{ inputs.dry_run }}" = "true" ]; then
            DRY_RUN_FLAG="--dry-run"
          fi
          uv run python -m scripts.push_dataset_to_hub \
            --repo "${{ vars.HF_DATASET_REPO || 'RahuL0009/hindsight-corpus' }}" \
            --tag "${{ github.ref_name || 'dev' }}" \
            --export-dir data/export \
            $DRY_RUN_FLAG

  publish-model:
    name: Publish ONNX Model to Hugging Face Hub
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "latest"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: uv sync

      - name: Export model to ONNX int8
        env:
          DATABASE_URL: "postgresql+asyncpg://hindsight:hindsight@localhost:5432/hindsight"
        run: |
          uv run python -m ml.export.onnx_export \
            --model models/deberta-taxonomy/best \
            --out models/deberta-taxonomy/onnx

      - name: Push model to Hugging Face Hub
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          DRY_RUN_FLAG=""
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ "${{ inputs.dry_run }}" = "true" ]; then
            DRY_RUN_FLAG="--dry-run"
          fi
          uv run python scripts/push_model_to_hub.py \
            --repo "${{ vars.HF_MODEL_REPO || 'RahuL0009/hindsight-taxonomy' }}" \
            --model-dir models/deberta-taxonomy/onnx \
            --tag "${{ github.ref_name || 'dev' }}" \
            $DRY_RUN_FLAG

  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: []  # Add publish-dataset and publish-model when enabled
    if: false  # Enable in Week 6
    steps:
      - uses: actions/checkout@v4

